name: toilet-kpi

services:
  backend:
    build:
      context: ./
      target: prod
    container_name: toilet-kpi-backend
    env_file:
      - .env
    environment:
      - DATABASE_FILE=/app/data/toilet_kpi.db
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - toilet-kpi-net

volumes:
  backend-data:

networks:
  toilet-kpi-net:
    driver: bridge
