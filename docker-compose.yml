name: toilet-kpi

# Base = ambiente de DEV (hot reload).
# Para produção: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  cassandra:
    image: cassandra:5
    container_name: toilet-kpi-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks:
      - toilet-kpi-net

  backend:
    build:
      context: ./backend
      target: dev
    container_name: toilet-kpi-backend
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      - PORT=3001
      # Dentro da rede do compose o Cassandra é alcançado pelo NOME do serviço.
      - CASSANDRA_CONTACT_POINTS=cassandra
      - CASSANDRA_LOCAL_DC=datacenter1
      - CASSANDRA_KEYSPACE=toilet_kpi
      - JWT_SECRET=dev-secret-troque-em-producao
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      # Polling: torna o watch confiável em bind mounts no Windows/WSL.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3001:3001"
    volumes:
      # Código montado para hot reload; node_modules da imagem é preservado.
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - toilet-kpi-net

  # Frontend definido 100% aqui (imagem genérica) — nenhum arquivo é criado em frontend/.
  # O outro dev pode substituir por um frontend/Dockerfile próprio depois.
  frontend:
    image: node:22-slim
    container_name: toilet-kpi-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      # O navegador (host) chama o backend em localhost:3001 — NÃO o nome de serviço.
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    # --no-package-lock: instala a partir do package.json e NUNCA lê/escreve o
    # package-lock.json, garantindo que nenhum arquivo dentro de frontend/ seja
    # alterado (o lockfile commitado está dessincronizado/sem deps nativas Linux).
    command: sh -c "npm install --no-package-lock && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - toilet-kpi-net

volumes:
  cassandra-data:

networks:
  toilet-kpi-net:
    driver: bridge
